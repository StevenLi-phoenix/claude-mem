name: Sync upstream

on:
  schedule:
    - cron: '0 8 * * *'  # UTC 8:00 = 北京时间 16:00，每天一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/thedotmack/claude-mem.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date"
            exit 0
          fi

          if git merge upstream/main --no-edit; then
            git push origin main
            echo "Merged upstream/main successfully"
          else
            git merge --abort
            echo "::warning::Merge conflict detected, creating PR instead"
            BRANCH="auto-sync/upstream-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git merge upstream/main --no-edit || true
            echo "Conflict needs manual resolution"
            exit 1
          fi
