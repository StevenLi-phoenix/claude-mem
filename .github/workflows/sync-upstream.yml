name: Sync upstream

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream main
        id: sync
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/thedotmack/claude-mem.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date"
            echo "status=up-to-date" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge upstream/main --no-edit; then
            git push origin main
            echo "Merged upstream/main successfully"
            echo "status=merged" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "::warning::Merge conflict detected, will use Claude Code to resolve"
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve conflicts with Claude Code
        if: steps.sync.outputs.status == 'conflict'
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Upstream main from thedotmack/claude-mem has conflicts with our fork.
            Run: git remote add upstream https://github.com/thedotmack/claude-mem.git && git fetch upstream main && git merge upstream/main
            Then resolve all merge conflicts. Our local changes (HEAD) take priority over upstream when intent conflicts. For purely additive upstream changes, accept them.
            After resolving, commit the merge and push to origin main.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model sonnet"
