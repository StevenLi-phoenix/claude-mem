name: Sync upstream

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream main
        id: sync
        run: |
          set -euo pipefail
          git config user.name "claudecode[bot]"
          git config user.email "noreply@anthropic.com"
          git remote add upstream https://github.com/thedotmack/claude-mem.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date"
            echo "status=up-to-date" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge upstream/main --no-edit; then
            git push origin main
            echo "Merged upstream/main successfully"
            echo "status=merged" >> "$GITHUB_OUTPUT"
          else
            git merge --abort
            echo "::warning::Merge conflict detected, will use Claude Code to resolve"
            echo "status=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Claude Code
        if: steps.sync.outputs.status == 'conflict'
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve conflicts with Claude Code
        if: steps.sync.outputs.status == 'conflict'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "claudecode[bot]"
          git config user.email "noreply@anthropic.com"

          # Start merge (will have conflicts)
          git merge upstream/main --no-edit || true

          # Use Claude Code to resolve conflicts
          claude -p "
          There are git merge conflicts in this repository. Resolve ALL conflicts:
          - Our local changes (HEAD) take priority when there is an intent conflict.
          - For purely additive upstream changes, accept them.
          - For import conflicts, keep BOTH sides.
          - After resolving each file, run 'git add <file>'.
          - Finally run 'git status' to verify no conflicts remain.
          Do NOT create a commit - just resolve and stage.
          " --model sonnet --allowedTools "Bash,Read,Write,Edit,Glob,Grep"

          # Verify no conflict markers remain
          if grep -rn "<<<<<<" --include="*.ts" --include="*.js" .; then
            echo "::error::Conflict markers still present"
            exit 1
          fi

          # Commit and push
          git commit --no-edit
          git push origin main
          echo "Conflicts resolved and pushed"
